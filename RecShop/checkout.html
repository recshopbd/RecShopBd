<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | RECSHOP Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background-color: #0b0d11; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            background-image: radial-gradient(circle at 50% -20%, #1c1f26 0%, #0b0d11 100%);
        }

        .checkout-card {
            background: rgba(22, 26, 33, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input:focus {
            border-color: #39FF14;
            background: rgba(57, 255, 20, 0.02);
            box-shadow: 0 0 0 4px rgba(57, 255, 20, 0.1);
            outline: none;
        }

        .payment-box {
            background: linear-gradient(145deg, rgba(57, 255, 20, 0.05) 0%, rgba(11, 13, 17, 1) 100%);
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        .btn-confirm {
            background: #39FF14;
            color: #000;
            font-weight: 800;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(57, 255, 20, 0.4);
        }

        .btn-confirm:active { transform: translateY(0); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1c1f26; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-lg">
        <!-- Logo/Brand -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#39FF14] rounded flex items-center justify-center font-black text-black text-xs italic">REC</div>
                <span class="font-black text-xl tracking-tighter uppercase">SHOP.</span>
            </div>
        </div>

        <div class="checkout-card rounded-[2.5rem] p-8 md:p-10">
            <!-- Order Header -->
            <div class="mb-10 text-center">
                <h1 class="text-xs font-bold text-slate-500 uppercase tracking-[0.4em] mb-2">Checkout Details</h1>
                <div class="h-[1px] w-12 bg-[#39FF14] mx-auto"></div>
            </div>

            <!-- 1. Order Summary -->
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="p-name" class="text-2xl font-extrabold tracking-tight italic text-white uppercase leading-none">...</h2>
                    <p class="text-slate-500 text-[10px] font-bold uppercase mt-1 tracking-widest">Licensed Digital Product</p>
                </div>
                <div class="text-right">
                    <p id="display-price" class="text-3xl font-black text-[#39FF14] tracking-tighter">... TK</p>
                    <p id="discount-info" class="hidden text-[9px] font-black text-pink-500 uppercase tracking-tighter mt-1"></p>
                </div>
            </div>

            <!-- 2. Customer Form -->
            <div class="space-y-4 mb-8 input-group">
                <input id="customer_name" type="text" placeholder="Full Name" class="w-full p-4 rounded-2xl text-sm font-medium">
                <input id="phone" type="tel" placeholder="bKash / Nagad Number" class="w-full p-4 rounded-2xl text-sm font-medium">
                <input id="email" type="email" placeholder="Email Address (Mandatory)" class="w-full p-4 rounded-2xl text-sm font-medium">
                
                <div class="grid grid-cols-2 gap-4">
                    <input id="city" type="text" placeholder="City" class="w-full p-4 rounded-2xl text-sm font-medium">
                    <input id="address" type="text" placeholder="Address / Area" class="w-full p-4 rounded-2xl text-sm font-medium">
                </div>

                <!-- Promo Input -->
                <div class="flex gap-2 pt-2">
                    <input id="coupon-input" type="text" placeholder="ENTER PROMO CODE" class="flex-1 p-4 rounded-2xl text-xs font-black tracking-widest !bg-amber-500/5">
                    <button onclick="applyCoupon()" class="px-6 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition">Apply</button>
                </div>
            </div>

            <!-- 3. Secure Payment -->
            <div class="payment-box rounded-3xl p-6 mb-10 text-center">
                <div class="flex items-center justify-center gap-2 mb-3">
                    <svg class="w-3 h-3 text-[#39FF14]" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                    <p class="text-[10px] font-black uppercase tracking-[0.2em] text-[#39FF14]">Secure Manual Payment</p>
                </div>
                <p class="text-xs text-slate-400 mb-5">Send Money to <span class="text-white font-bold tracking-wider">+8801805536811</span> then enter TrxID:</p>
                <input id="transaction_id" type="text" placeholder="TRANSACTION ID (TRXID)" class="w-full p-4 rounded-2xl !bg-black/60 !border-[#39FF14]/30 text-center font-black text-sm uppercase tracking-[0.3em] focus:border-[#39FF14]">
            </div>

            <!-- 4. Error/Success Messages -->
            <div id="login-error" class="hidden bg-red-500/10 border border-red-500/20 p-4 rounded-2xl mb-6 text-center">
                <p class="text-red-500 text-xs font-bold mb-2">Authorization Required</p>
                <a href="index.html" class="text-white text-[10px] font-black uppercase underline tracking-widest">Go to Login</a>
            </div>

            <button id="btn" onclick="placeOrder()" class="btn-confirm w-full py-5 rounded-2xl text-sm shadow-xl">
                Place Secure Order
            </button>

            <p id="success-msg" class="hidden text-[#39FF14] text-[10px] font-black text-center mt-6 uppercase tracking-widest animate-pulse">
                Processing Secure Order...
            </p>
        </div>
        
        <p class="text-center text-slate-600 text-[9px] font-bold uppercase tracking-[0.3em] mt-8">
            © 2026 RECSHOP DIGITAL • SECURED BY SUPABASE
        </p>
    </div>

    <script>
        const SUPABASE_URL = 'https://pnfjgklkkadedtssxvbl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JGk4_cBt3-phnbPbbFIl7A_yvuVt-Ki';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || "Digital Product";
        let originalPrice = parseFloat(params.get('price')) || 0;
        let finalPrice = originalPrice;
        let discountAmt = 0;
        let appliedCoupon = null;

        document.getElementById('p-name').innerText = name;
        document.getElementById('display-price').innerText = originalPrice + " TK";

        async function applyCoupon() {
            const inputField = document.getElementById('coupon-input');
            const code = inputField.value.toUpperCase().trim();
            inputField.value = code;
            
            if (!code) return;

            const { data } = await client.from('coupons').select('*').eq('code', code).eq('is_active', true).single();

            if (data) {
                discountAmt = (originalPrice * (data.discount_percent / 100));
                finalPrice = originalPrice - discountAmt;
                appliedCoupon = code;

                document.getElementById('display-price').innerHTML = `<span class="line-through text-slate-500 text-sm mr-2">${originalPrice}</span> ${finalPrice} TK`;
                const info = document.getElementById('discount-info');
                info.innerText = `Discount added: -${discountAmt.toFixed(0)} TK`;
                info.classList.remove('hidden');
            } else {
                alert("Invalid Promo Code");
            }
        }

        async function placeOrder() {
            const btn = document.getElementById('btn');
            const { data: { user } } = await client.auth.getUser();

            if (!user) {
                document.getElementById('login-error').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            const customer_name = document.getElementById('customer_name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const city = document.getElementById('city').value.trim();
            const address = document.getElementById('address').value.trim();
            const trx_id = document.getElementById('transaction_id').value.trim();

            if (!customer_name || !email || !city || !trx_id) {
                return alert("Please fill all mandatory fields!");
            }

            btn.disabled = true;
            btn.innerText = "PREPARING...";

            const { data, error } = await client.from('orders').insert([{
                customer_name, phone, email, city, address,
                transaction_id: trx_id,
                product_name: name,
                total_price: finalPrice,
                coupon_code: appliedCoupon,
                discount_amount: discountAmt,
                status: 'pending', 
                user_id: user.id
            }]).select();

            if (!error) {
                document.getElementById('success-msg').classList.remove('hidden');
                btn.innerText = "ORDER PLACED ✔";
                setTimeout(() => { window.location.href = "index.html"; }, 1500);
            } else {
                alert(error.message);
                btn.disabled = false;
                btn.innerText = "Place Secure Order";
            }
        }
    </script>
</body>
</html>
