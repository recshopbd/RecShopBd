<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RECSHOP | Master Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0d11; color: white; margin: 0; display: none; }
        .glass { background: rgba(22, 26, 33, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-btn { transition: all 0.3s; border-radius: 12px; color: #64748b; }
        .sidebar-btn.active { background: #39FF14; color: black; }
        .order-row { transition: all 0.3s ease; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .order-details { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(0,0,0,0.2); }
        .order-row.expanded + .order-details { max-height: 600px; border-bottom: 1px solid rgba(57, 255, 20, 0.2); }
        input, textarea, select { background: rgba(0,0,0,0.4) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        input:focus, select:focus { border-color: #39FF14 !important; }
    </style>
</head>
<body class="min-h-screen flex" id="admin-body">

    <aside class="w-64 bg-[#090b0e] border-r border-white/5 fixed h-full p-8 flex flex-col">
        <div class="flex items-center gap-2 mb-12"><div class="w-8 h-8 bg-[#39FF14] rounded flex items-center justify-center font-black text-black text-xs">REC</div><span class="font-black italic uppercase tracking-tighter">Admin Panel</span></div>
        <nav class="space-y-3 flex-1">
            <button onclick="switchTab('orders')" id="btn-orders" class="sidebar-btn active w-full text-left px-6 py-3 font-bold text-[10px] uppercase tracking-widest">🛒 Live Orders</button>
            <button onclick="switchTab('inventory')" id="btn-inventory" class="sidebar-btn w-full text-left px-6 py-3 font-bold text-[10px] uppercase tracking-widest text-slate-500">📦 Manage Products</button>
            <button onclick="switchTab('coupons')" id="btn-coupons" class="sidebar-btn w-full text-left px-6 py-3 font-bold text-[10px] uppercase tracking-widest text-slate-500">🎟️ Promo Codes</button>
        </nav>
        <div class="mt-auto text-center"><a href="index.html" class="block text-slate-600 font-bold text-[10px] uppercase hover:text-white transition">← Exit to Store</a></div>
    </aside>

    <main class="flex-1 ml-64 p-12">
        <!-- Orders Tab -->
        <div id="tab-orders">
            <h2 class="text-4xl font-black uppercase italic tracking-tighter mb-10 text-[#39FF14]">Live Orders</h2>
            <div class="glass rounded-[2rem] overflow-hidden"><div id="orders-list"></div></div>
        </div>

        <!-- Inventory Tab (Now with Edit Button) -->
        <div id="tab-inventory" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-black uppercase italic tracking-tighter text-[#00D1FF]">Inventory</h2>
                <div class="flex gap-4">
                    <select id="inv-cat-filter" onchange="fetchInventory()" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase">
                        <option value="games">🎮 PC Games</option>
                        <option value="wallet">💳 Steam Wallet</option>
                        <option value="keys">🔑 Random Keys</option>
                    </select>
                    <button onclick="openAddModal()" class="bg-[#39FF14] text-black px-6 py-2 rounded-xl font-black text-[10px] uppercase transition hover:scale-105">+ Add Product</button>
                </div>
            </div>
            <div class="glass rounded-[2rem] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] font-black uppercase text-slate-500">
                        <tr><th class="p-6">Photo</th><th class="p-6">Product Name</th><th class="p-6">Price</th><th class="p-6 text-right">Action</th></tr>
                    </thead>
                    <tbody id="inventory-table" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>

        <!-- Coupons Tab -->
        <div id="tab-coupons" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-black uppercase italic tracking-tighter text-pink-500">Promo Codes</h2>
                <div class="flex gap-2">
                    <input id="coupon-code" placeholder="CODE" class="p-2 rounded-lg text-xs uppercase font-bold">
                    <input id="coupon-pct" type="number" placeholder="%" class="p-2 rounded-lg text-xs w-16">
                    <button onclick="saveCoupon()" class="bg-pink-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Create</button>
                </div>
            </div>
            <div class="glass rounded-[2rem] overflow-hidden"><table class="w-full text-left"><tbody id="coupons-table" class="divide-y divide-white/5"></tbody></table></div>
        </div>
    </main>

    <!-- Product Modal (Add & Edit) -->
    <div id="product-modal" class="fixed inset-0 bg-black/95 z-[500] hidden items-center justify-center p-6">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md border border-white/10 text-white">
            <h3 id="modal-type-title" class="text-2xl font-black uppercase italic mb-8">New Product</h3>
            <div class="space-y-4">
                <input id="new-p-name" type="text" placeholder="Name" class="w-full p-4 rounded-xl">
                <input id="new-p-price" type="number" placeholder="Price" class="w-full p-4 rounded-xl">
                <div>
                    <label class="text-[9px] uppercase font-bold text-slate-500 ml-1">Update Photo (Leave empty to keep current)</label>
                    <input id="new-p-img" type="file" accept="image/*" class="w-full p-2 mt-1 rounded-lg text-xs">
                </div>
                <select id="new-p-cat" class="w-full p-4 rounded-xl"><option value="games">PC Games</option><option value="wallet">Steam Wallet</option><option value="keys">Random Keys</option></select>
                <textarea id="new-p-desc" placeholder="Details..." class="w-full p-4 rounded-xl h-24"></textarea>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeAddModal()" class="flex-1 py-4 bg-white/5 rounded-xl font-bold text-xs uppercase">Cancel</button>
                <button id="save-btn" onclick="saveProduct()" class="flex-1 py-4 bg-[#39FF14] text-black font-black rounded-xl uppercase">Save Item</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pnfjgklkkadedtssxvbl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JGk4_cBt3-phnbPbbFIl7A_yvuVt-Ki';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        emailjs.init("-ib_0931Q_Rh-38SX");
        const ADMIN_EMAIL = 'rifatfardin0@gmail.com';
        
        let editingProductId = null; // Track if we are editing

        async function checkAdmin() {
            const { data: { user } } = await client.auth.getUser();
            if (!user || user.email !== ADMIN_EMAIL) window.location.href = 'index.html';
            else { document.getElementById('admin-body').style.display = 'flex'; document.getElementById('admin-user-info').innerText = user.email; fetchOrders(); }
        }
        checkAdmin();

        function switchTab(tab) {
            ['orders', 'inventory', 'coupons'].forEach(t => document.getElementById(`tab-${t}`).classList.add('hidden'));
            ['orders', 'inventory', 'coupons'].forEach(t => document.getElementById(`btn-${t}`).classList.remove('active', 'text-black'));
            ['orders', 'inventory', 'coupons'].forEach(t => document.getElementById(`btn-${t}`).classList.add('text-slate-500'));
            
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('active');
            document.getElementById(`btn-${tab}`).classList.remove('text-slate-500');
            if(tab === 'inventory') fetchInventory();
            if(tab === 'coupons') fetchCoupons();
            if(tab === 'orders') fetchOrders();
        }

        // --- INVENTORY (With Edit logic) ---
        async function fetchInventory() {
            const cat = document.getElementById('inv-cat-filter').value;
            const { data } = await client.from('products').select('*').eq('category', cat).order('created_at', {ascending: false});
            document.getElementById('inventory-table').innerHTML = data.map(p => `
                <tr class="hover:bg-white/5 transition">
                    <td class="p-6">${p.image_url ? `<img src="${p.image_url}" class="w-12 h-12 object-cover rounded-lg border border-white/10">` : `<div class="w-12 h-12 bg-white/5 rounded-lg"></div>`}</td>
                    <td class="p-6 font-bold uppercase italic text-sm tracking-tighter">${p.name}</td>
                    <td class="p-6 text-[#39FF14] font-black">${p.price} TK</td>
                    <td class="p-6 text-right">
                        <button onclick='openEditModal(${JSON.stringify(p)})' class="text-[#00D1FF] font-bold text-[9px] uppercase mr-4 hover:underline">Edit</button>
                        <button onclick="deleteProduct('${p.id}')" class="text-red-500 font-bold text-[9px] uppercase hover:underline">Delete</button>
                    </td>
                </tr>`).join('');
        }

        function openEditModal(product) {
            editingProductId = product.id;
            document.getElementById('modal-type-title').innerText = "Edit Product";
            document.getElementById('new-p-name').value = product.name;
            document.getElementById('new-p-price').value = product.price;
            document.getElementById('new-p-cat').value = product.category;
            document.getElementById('new-p-desc').value = product.description || "";
            document.getElementById('product-modal').classList.replace('hidden', 'flex');
        }

        async function saveProduct() {
            const btn = document.getElementById('save-btn');
            const name = document.getElementById('new-p-name').value;
            const price = document.getElementById('new-p-price').value;
            const cat = document.getElementById('new-p-cat').value;
            const desc = document.getElementById('new-p-desc').value;
            const imgFile = document.getElementById('new-p-img').files[0];

            if(!name || !price) return alert("Fill Name and Price!");
            btn.disabled = true; btn.innerText = "SAVING...";

            let imageUrl = null;
            if (imgFile) {
                const fName = `${Date.now()}_${imgFile.name.replace(/\s/g, '_')}`;
                const { data: upData } = await client.storage.from('product-images').upload(fName, imgFile);
                const { data: urlData } = client.storage.from('product-images').getPublicUrl(fName);
                imageUrl = urlData.publicUrl;
            }

            const productData = { name, price, category: cat, description: desc };
            if (imageUrl) productData.image_url = imageUrl;

            let error;
            if (editingProductId) {
                // UPDATE Existing
                const result = await client.from('products').update(productData).eq('id', editingProductId);
                error = result.error;
            } else {
                // INSERT New
                const result = await client.from('products').insert([productData]);
                error = result.error;
            }

            if(error) alert(error.message); 
            else { closeAddModal(); fetchInventory(); }
            btn.disabled = false; btn.innerText = "SAVE ITEM";
        }

        // --- REST OF Logic (Same as before) ---
        function openAddModal() { 
            editingProductId = null;
            document.getElementById('modal-type-title').innerText = "New Product";
            document.getElementById('new-p-name').value = "";
            document.getElementById('new-p-price').value = "";
            document.getElementById('new-p-desc').value = "";
            document.getElementById('product-modal').classList.replace('hidden', 'flex'); 
        }
        function closeAddModal() { document.getElementById('product-modal').classList.replace('flex', 'hidden'); }
        async function deleteProduct(id) { if(confirm('Delete?')) { await client.from('products').delete().eq('id', id); fetchInventory(); } }
        async function fetchOrders() {
            const { data } = await client.from('orders').select('*').order('created_at', {ascending: false});
            document.getElementById('orders-list').innerHTML = data.map(o => `
                <div>
                    <div class="order-row grid grid-cols-4 p-6 items-center" onclick="this.classList.toggle('expanded')">
                        <div class="font-bold text-white uppercase italic text-sm">${o.customer_name}</div>
                        <div class="text-[#00D1FF] font-black uppercase text-xs">${o.product_name}</div>
                        <div><span class="px-3 py-1 rounded-full text-[8px] font-black uppercase ${o.status === 'delivered' ? 'bg-green-500/10 text-green-500' : 'bg-amber-500/10 text-amber-500'}">${o.status}</span></div>
                        <div class="text-right text-slate-600 text-[10px] font-black">EXPAND</div>
                    </div>
                    <div class="order-details">
                        <div class="p-8 grid grid-cols-2 gap-8 border-t border-white/5">
                            <div class="space-y-2 text-xs text-slate-400">
                                <p><b class="text-[#39FF14] uppercase text-[9px]">Total:</b> ${o.total_price}</p>
                                <p><b class="text-[#39FF14] uppercase text-[9px]">Email:</b> ${o.email}</p>
                                <p><b class="text-[#39FF14] uppercase text-[9px]">WhatsApp:</b> ${o.phone}</p>
                                <p><b class="text-[#39FF14] uppercase text-[9px]">Address:</b> ${o.address}, ${o.city}</p>
                                <p><b class="text-pink-500 uppercase text-[9px]">Coupon:</b> ${o.coupon_code || 'None'} (-${o.discount_amount || 0} TK)</p>
                            </div>
                            <div>${o.status === 'delivered' ? `<code class="block p-3 bg-green-500/10 text-green-500 rounded-lg text-center font-bold">${o.delivery_key}</code>` : `<div class="flex gap-2"><input id="key-${o.id}" placeholder="Key" class="flex-1 p-3 rounded-xl text-xs"><button onclick="deliverKey('${o.id}')" class="bg-[#39FF14] text-black px-6 rounded-xl font-black text-[10px] uppercase">Deliver</button></div>`}</div>
                        </div>
                    </div>
                </div>`).join('');
        }
        async function deliverKey(id) {
            const val = document.getElementById(`key-${id}`).value;
            const { data: order } = await client.from('orders').select('*').eq('id', id).single();
            await client.from('orders').update({ delivery_key: val, status: 'delivered' }).eq('id', id);
            emailjs.send("recshopemailservice", "recshoporderdelivered", { customer_name: order.customer_name, product_name: order.product_name, delivery_key: val, to_email: order.email, order_id: order.id.split('-')[0] });
            fetchOrders();
        }
        async function fetchCoupons() {
            const { data } = await client.from('coupons').select('*').order('created_at', {ascending: false});
            document.getElementById('coupons-table').innerHTML = data.map(c => `<tr class="hover:bg-white/5"><td class="p-6 font-bold text-[#39FF14]">${c.code}</td><td class="p-6 font-black">${c.discount_percent}% OFF</td><td class="p-6 text-right"><button onclick="deleteCoupon('${c.id}')" class="text-red-500 text-[10px] font-black uppercase">Remove</button></td></tr>`).join('');
        }
        async function saveCoupon() {
            const code = document.getElementById('coupon-code').value.toUpperCase();
            const pct = document.getElementById('coupon-pct').value;
            await client.from('coupons').insert([{ code, discount_percent: pct }]);
            document.getElementById('coupon-code').value = ''; document.getElementById('coupon-pct').value = ''; fetchCoupons();
        }
        async function deleteCoupon(id) { await client.from('coupons').delete().eq('id', id); fetchCoupons(); }
    </script>
</body>
</html>
